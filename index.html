            if (!text) return null;
            const regex = new RegExp(`\\b(${glossaryAcronyms.join('|')})\\b`, 'gi');
            const parts = text.split(regex);
            return (
                <span className="inline">
                    {parts.map((part, i) => {
                        const isTerm = glossaryAcronyms.find(t => t.toLowerCase() === part.toLowerCase());
                        if (isTerm && onNavigate) {
                            return (
                                <button key={i}
                                    onClick={e => { e.stopPropagation(); onNavigate(isTerm); }}

                                </button>
                            );
                        }
                        return <span key={i}>{part}</span>;

                            {/* Barre de recherche */}
                            <div className="relative max-w-lg mx-auto">
                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i className="fa-solid fa-magnifying-glass text-slate-400"></i>
                                </div>
                                <input
                                    type="text"
                                    placeholder="Rechercher (ex: EORI, IPAFFS, Sanitaire…)"
                                    value={searchTerm}
                                    onChange={e => setSearchTerm(e.target.value)}
                                    className="w-full pl-11 pr-10 py-4 rounded-2xl bg-white/10 border border-white/20 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:bg-white/20 transition-all backdrop-blur-sm"
                                />
                                {searchTerm && (
                                    <button onClick={() => setSearchTerm('')}
                                        className="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-white transition-colors">
                                        <i className="fa-solid fa-xmark"></i>
                                    </button>
                                )}
                            </div>
                            {/* Filtres rapides par catégorie */}
                            <div className="flex flex-wrap justify-center gap-2 mt-4">
                                {categories.map(cat => (
                                    <button key={cat}
                                        onClick={() => setSearchTerm(cat)}
                                        className="px-3 py-1 rounded-full text-xs font-medium bg-white/10 hover:bg-white/20 text-slate-300 hover:text-white border border-white/10 transition-colors">
                                        {cat}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="max-w-6xl mx-auto px-4">
                        {/* Compteur */}
                        {searchTerm && (
                            <div className="text-center mb-6 text-slate-500 text-sm">
                                {filtered.length === 0 ? 'Aucun résultat' : `${filtered.length} résultat${filtered.length > 1 ? 's' : ''} pour « ${searchTerm} »`}
                            </div>
                        )}

                        {filtered.length === 0 ? (
                            <div className="text-center py-20 bg-white rounded-2xl border border-slate-200 shadow-sm">
                                <i className="fa-solid fa-ghost text-4xl text-slate-300 mb-4 block"></i>
                                <h3 className="text-xl font-bold text-slate-600">Aucun terme trouvé</h3>
                                <p className="text-slate-400 text-sm mt-2">Essayez un autre mot-clé ou parcourez toutes les catégories</p>
                            </div>
                        ) : (
                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-5">
                                {filtered.map((item, idx) => {
                                    const c = colorMap[item.color] || colorMap.slate;
                                    return (
                                        <div key={idx}
                                             ref={el => cardRefs.current[item.term] = el}
                                             className="card-lift bg-white rounded-xl shadow-sm border border-slate-200 p-6 hover:border-purple-200 flex flex-col h-full">
                                            <div className="flex justify-between items-start mb-4">
                                                <div className={`w-11 h-11 rounded-xl flex items-center justify-center text-lg ${c.icon}`}>
                                                    <i className={`fa-solid ${item.icon}`}></i>
                                                </div>
                                                <span className={`badge px-2.5 py-1.5 rounded-lg border ${c.bg} ${c.text} ${c.border}`}>
                                                    {item.category}
                                                </span>
                                            </div>
                                            <h3 className="font-extrabold text-xl text-slate-800 mb-1">{item.term}</h3>
                                            <div className="badge text-slate-400 mb-3 leading-snug">{item.fullName}</div>
                                            <p className="text-sm text-slate-600 leading-relaxed flex-grow">{item.definition}</p>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        /* ══════════════════════════════════════════
           APP PRINCIPALE
        ══════════════════════════════════════════ */
        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [selectedStep, setSelectedStep] = useState(null);
            const [glossarySearchQuery, setGlossarySearchQuery] = useState('');
            const [showBackToTop, setShowBackToTop] = useState(false);

            // BUG FIX : fermeture modal par Escape est dans Modal lui-même
            // Scroll tracker pour bouton retour en haut
            useEffect(() => {
                const handler = () => setShowBackToTop(window.scrollY > 400);
                window.addEventListener('scroll', handler, { passive: true });
                return () => window.removeEventListener('scroll', handler);
            }, []);

            // Scroll to top lors du changement d'onglet
            useEffect(() => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, [activeTab]);

            const handleNavigateGlossary = useCallback((term) => {
                setGlossarySearchQuery(term);
                setActiveTab('glossary');
                setSelectedStep(null);
            }, []);

            const handleTabChange = useCallback((tab, resetSearch = false) => {
                setActiveTab(tab);
                if (resetSearch) setGlossarySearchQuery('');
            }, []);

            return (
                <div className="min-h-screen font-sans bg-slate-50">
                    <Navigation activeTab={activeTab} setTab={handleTabChange} />

                    {activeTab === 'home'     && <HomePage setTab={handleTabChange} />}
                    {activeTab === 'europe'   && <EuropePage setSelectedStep={setSelectedStep} onNavigateGlossary={handleNavigateGlossary} />}
                    {activeTab === 'uk'       && <UKPage setSelectedStep={setSelectedStep} onNavigateGlossary={handleNavigateGlossary} />}
                    {activeTab === 'strategy' && <StrategyPage />}
                    {activeTab === 'glossary' && <GlossaryPage searchQuery={glossarySearchQuery} />}

                    <footer className="bg-slate-900 text-slate-400 py-12 border-t border-slate-800">
                        <div className="max-w-4xl mx-auto px-4 text-center">
                            <div className="text-white font-extrabold text-lg mb-1" style={{fontFamily:'Syne,sans-serif'}}>
                                BO'NATURE <span className="text-blue-400">EXPORT</span>
                            </div>
                            <p className="text-sm mb-1">Référentiel Stratégique &amp; Réglementaire 2026</p>
                            <p className="text-xs text-slate-500">Projet étudiant — Analyse export Bo'Nature</p>
                            <p className="text-xs text-slate-600 mt-2">Elsa Leconte · Lina Baio · Chloé Beaume · Romane De Jesus · Agathe Perrilliat-Merceroz · Camille Barone · Kévin Celoro</p>
                        </div>
                    </footer>

                    {/* Bouton retour en haut */}
                    <button
                        onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
                        aria-label="Retour en haut"
                        className={`back-to-top w-12 h-12 bg-slate-900 hover:bg-blue-600 text-white rounded-full shadow-xl flex items-center justify-center transition-colors ${showBackToTop ? 'visible' : ''}`}>
                        <i className="fa-solid fa-chevron-up"></i>
                    </button>

                    <Modal
                        data={selectedStep}
                        onClose={() => setSelectedStep(null)}
                        onNavigateGlossary={handleNavigateGlossary} />
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
